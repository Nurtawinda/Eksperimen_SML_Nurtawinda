name: AutoPrerocessing

on:
  push:
    branches:
      - main
    paths:
      - './credit_risk_dataset_preprocessing.csv'
      - './automate_Nurtawinda.py'

  workflow_dispatch:

jobs:
  run-preprocessing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow

    - name: Run mlflow project
      run: |
        mlflow run Project --env-manager=local

          git commit -m "Automated preprocessing"
          git push origin main